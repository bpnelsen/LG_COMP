<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; width: 280px; padding: 16px; background: #f9fafb; color: #111; }
    h1 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: #1a1a2e; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
    .dot.active { background: #22c55e; }
    .dot.inactive { background: #ef4444; }
    .label { font-size: 13px; }
    button { width: 100%; padding: 8px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
    #toggleBtn.on  { background: #ef4444; color: #fff; }
    #toggleBtn.off { background: #22c55e; color: #fff; }
    #captureBtn { background: #3b82f6; color: #fff; }
    #captureBtn:disabled { background: #93c5fd; cursor: not-allowed; }
    a.settings { display: block; text-align: center; font-size: 12px; color: #6b7280; text-decoration: none; margin-top: 4px; }
    a.settings:hover { color: #3b82f6; }
    .stat { font-size: 12px; color: #6b7280; text-align: center; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>LG Companion</h1>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span class="label" id="statusLabel">Loading…</span>
  </div>
  <button id="toggleBtn">…</button>
  <button id="captureBtn">Capture Now</button>
  <a class="settings" href="options.html" target="_blank">Settings</a>
  <div class="stat" id="stat"></div>
  <script src="popup.js"></script>
</body>
</html>
