<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LG Companion Settings</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; color: #111; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    input[type=text], input[type=url] {
      width: 100%; padding: 8px 10px; border: 1px solid #d1d5db;
      border-radius: 6px; font-size: 14px; margin-bottom: 16px;
    }
    .hint { font-size: 12px; color: #6b7280; margin-top: -12px; margin-bottom: 16px; }
    button { padding: 8px 20px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:hover { background: #2563eb; }
    #saved { display: none; color: #22c55e; font-size: 13px; margin-left: 12px; }
    a { font-size: 13px; color: #3b82f6; }
  </style>
</head>
<body>
  <h1>LG Companion Settings</h1>

  <label for="backendUrl">Backend URL</label>
  <input type="url" id="backendUrl" placeholder="http://localhost:3001" />
  <p class="hint">The local analysis backend. Keep default unless you changed the port.</p>

  <label for="targetDomain">Target Domain</label>
  <input type="text" id="targetDomain" placeholder="landgorilla.com" />
  <p class="hint">Only capture pages on this domain. Leave blank to capture everything.</p>

  <button id="saveBtn">Save</button>
  <span id="saved">Saved!</span>

  <p style="margin-top:24px">
    <a href="http://localhost:3001" target="_blank">Open Reference Map Viewer →</a>
  </p>

  <script src="options.js"></script>
</body>
</html>
