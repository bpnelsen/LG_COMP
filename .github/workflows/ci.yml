name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: landgorilla-open/package-lock.json

      - name: Create loanscope DB user
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c \
            "CREATE USER loanscope WITH PASSWORD 'loanscope_dev' CREATEDB;"

      - name: Install dependencies
        working-directory: landgorilla-open
        run: npm ci

      - name: Type check
        working-directory: landgorilla-open
        run: npm run typecheck

      - name: Run tests
        working-directory: landgorilla-open
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: loanscope
          DB_PASSWORD: loanscope_dev
          JWT_SECRET: ci-jwt-secret-at-least-32-characters!!
          NODE_ENV: test
        run: npm test
